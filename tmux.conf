# Remap prefix to Ctrl-Space
set -g prefix C-Space
unbind C-b
bind C-Space send-prefix

# Promote current pane to main (largest) position
bind-key S swap-pane -d -t 0

# Show pane labels — prefer user-set @label (sticky; not clobbered by
# programs that update the terminal title via OSC sequences, e.g. Copilot
# CLI), falling back to the pane's cwd.
set -g pane-border-status top
set -g pane-border-format " #{pane_index}: #{?@label,#{@label},#{pane_current_path}} (#{pane_current_command}) "

# Disable alternate screen so scrollback always works
set -g terminal-overrides ',*:smcup@:rmcup@'

# Mouse support: wheel-scroll enters copy-mode over a pane's scrollback, and
# mouse-aware apps (e.g. Copilot CLI) still get forwarded events. Hold Shift
# to bypass tmux for native terminal selection/copy.
set -g mouse on

# Increase scrollback history. This MUST come before the session/panes are
# created below: history-limit is captured per pane at creation time, so a
# pane built earlier would keep the old default (2000) instead.
set -g history-limit 50000

# Default session layout: large left pane + 3 stacked right panes
new-session -d -s main -x 211 -y 54
split-window -h -l 100 -t main:0.0
split-window -v -t main:0.1
split-window -v -t main:0.2

select-pane -t 0
